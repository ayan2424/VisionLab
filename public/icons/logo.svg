<!-- VisionLab Cyan/Multi-color Logo SVG -->
<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 144 144" 
  width="36" 
  height="36"
  style="filter: drop-shadow(0 0 15px rgba(23, 195, 214, 0.5));"
>
  <defs>
    <style>
      .indigo  { fill: url(#grad-indigo); }
      .rose    { fill: url(#grad-rose); }
      .cyan    { fill: url(#grad-cyan); }
      .amber   { fill: url(#grad-amber); }
      .emerald { fill: url(#grad-emerald); }
      .violet  { fill: url(#grad-violet); }
    </style>

    <!-- Multi-color Theme Gradients (Cyan/Violet/Pink) -->
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/> <!-- Violet-400 -->
      <stop offset="100%" stop-color="#7C3AED"/> <!-- Violet-600 -->
    </linearGradient>
    <linearGradient id="grad-rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB7185"/> <!-- Pink-400 -->
      <stop offset="100%" stop-color="#E11D48"/> <!-- Pink-600 -->
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/> <!-- Blue-400 -->
      <stop offset="100%" stop-color="#2563EB"/> <!-- Blue-600 -->
    </linearGradient>
    <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/> <!-- Fuchsia-400 -->
      <stop offset="100%" stop-color="#A855F7"/> <!-- Fuchsia-600 -->
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/> <!-- Cyan-400 -->
      <stop offset="100%" stop-color="#0891B2"/> <!-- Cyan-600 -->
    </linearGradient>
    <linearGradient id="grad-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/> <!-- Indigo-400 -->
      <stop offset="100%" stop-color="#4F46E5"/> <!-- Indigo-600 -->
    </linearGradient>
  </defs>

  <g id="mark">
    <path id="checkmark-indigo" class="indigo" d="M 11.3,33.3 L 54.6,110.5 L 63.4,110.5 L 78.9,83.2 L 63.2,83.2 L 59.1,89.9 L 27.3,33.3 Z"/>
    <path id="ribbon-rose" class="rose" d="M 44.2,48.9 L 51.7,62.5 L 61.3,47.5 L 118.4,47.5 L 126.4,33.3 L 54.7,33.3 Z"/>
    <path id="cursor-arrow-cyan" class="cyan" d="M 62.8,57.4 L 60.5,59.6 L 67.2,66.1 L 60.6,73.3 L 62.9,75.5 L 71.9,66.1 Z"/>
    <path id="zigzag-amber" class="amber" d="M 105.7,55.7 L 89.8,55.7 L 97.0,68.7 L 73.5,110.7 L 89.5,110.7 L 113.3,68.9 Z"/>
    <path id="ribbon-emerald" class="emerald" d="M 90.1,110.6 L 126.3,110.6 L 134.5,96.2 L 98.1,96.2 Z"/>
    <path id="cursor-dash-violet" class="violet" d="M 72.3,72.5 L 85.8,72.5 L 85.8,75.6 L 72.3,75.6 Z"/>
  </g>
</svg>
