<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <style>
    :root {
      --bg-color:      #0E0E0E;
      --color-indigo:       #EA580C;
      --color-indigo-light: #F97316;
      --color-rose:         #D97706;
      --color-rose-light:   #F59E0B;
      --color-cyan:         #C2410C;
      --color-cyan-light:   #EA580C;
      --color-amber:        #EAB308;
      --color-amber-light:  #FDE047;
      --color-emerald:      #CA8A04;
      --color-emerald-light:#EAB308;
      --color-violet:       #9A3412;
      --color-violet-light: #C2410C;
    }
    .bg      { fill: none; } /* transparent by default — works on any header/footer background.
                                 For a solid backdrop (app icon/favicon), set this to var(--bg-color). */
    .indigo  { fill: url(#grad-indigo); }
    .rose    { fill: url(#grad-rose); }
    .cyan    { fill: url(#grad-cyan); }
    .amber   { fill: url(#grad-amber); }
    .emerald { fill: url(#grad-emerald); }
    .violet  { fill: url(#grad-violet); }
  </style>

  <title>VL Code Logo</title>
  <desc>Multi-color checkmark and code-cursor monogram logo</desc>

  <defs>
    <!-- Each gradient runs light to base along the shape's own diagonal (top-left to bottom-right).
         To switch any shape back to a flat color, change its CSS rule above from
         url(#grad-x) to the matching flat color variable listed at the top of the style block. -->
    <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="var(--color-indigo-light)"/>
      <stop offset="100%" stop-color="var(--color-indigo)"/>
    </linearGradient>
    <linearGradient id="grad-rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="var(--color-rose-light)"/>
      <stop offset="100%" stop-color="var(--color-rose)"/>
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="var(--color-cyan-light)"/>
      <stop offset="100%" stop-color="var(--color-cyan)"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="var(--color-amber-light)"/>
      <stop offset="100%" stop-color="var(--color-amber)"/>
    </linearGradient>
    <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="var(--color-emerald-light)"/>
      <stop offset="100%" stop-color="var(--color-emerald)"/>
    </linearGradient>
    <linearGradient id="grad-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="var(--color-violet-light)"/>
      <stop offset="100%" stop-color="var(--color-violet)"/>
    </linearGradient>
  </defs>

  <!-- Background canvas -->
  <rect id="background" class="bg" x="0" y="0" width="144" height="144" rx="0"/>

  <g id="mark">
    <!-- Indigo checkmark / "V" - primary brand shape: coding / core identity -->
    <path id="checkmark-indigo" class="indigo"
      d="M 11.3,33.3 L 54.6,110.5 L 63.4,110.5 L 78.9,83.2 L 63.2,83.2 L 59.1,89.9 L 27.3,33.3 Z"/>

    <!-- Rose ribbon (top bar) - energy accent: collaboration / video calling -->
    <path id="ribbon-rose" class="rose"
      d="M 44.2,48.9 L 51.7,62.5 L 61.3,47.5 L 118.4,47.5 L 126.4,33.3 L 54.7,33.3 Z"/>

    <!-- Cyan ">" cursor chevron - tech spark: AI -->
    <path id="cursor-arrow-cyan" class="cyan"
      d="M 62.8,57.4 L 60.5,59.6 L 67.2,66.1 L 60.6,73.3 L 62.9,75.5 L 71.9,66.1 Z"/>

    <!-- Amber zigzag / "Z" - warm accent: lectures / courses -->
    <path id="zigzag-amber" class="amber"
      d="M 105.7,55.7 L 89.8,55.7 L 97.0,68.7 L 73.5,110.7 L 89.5,110.7 L 113.3,68.9 Z"/>

    <!-- Emerald ribbon (bottom bar) - growth accent: classroom / progress -->
    <path id="ribbon-emerald" class="emerald"
      d="M 90.1,110.6 L 126.3,110.6 L 134.5,96.2 L 98.1,96.2 Z"/>

    <!-- Violet cursor dash "_" - creative accent: AI / collaboration -->
    <path id="cursor-dash-violet" class="violet"
      d="M 72.3,72.5 L 85.8,72.5 L 85.8,75.6 L 72.3,75.6 Z"/>
  </g>
</svg>
