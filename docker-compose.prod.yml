# ──────────────────────────────────────────────────────────────────────
# VisionLab— Production Docker Compose
# ──────────────────────────────────────────────────────────────────────
# Services: Laravel (PHP-FPM), Nginx, MySQL, Redis, Reverb
# code-server containers are spawned dynamically by CodeServerManager
# ──────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ── Laravel Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visioncode-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage/workspaces:/var/www/html/storage/workspaces
      - /var/run/docker.sock:/var/run/docker.sock  # Allow spawning code-server containers
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-visioncode}
      - DB_USERNAME=${DB_USERNAME:-visioncode}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - mysql
      - redis
    networks:
      - visioncode

  # ── Nginx Web Server ───────────────────────────────────────────
  webserver:
    image: nginx:alpine
    container_name: visioncode-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - visioncode

  # ── MySQL Database ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: visioncode-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-visioncode}
      MYSQL_USER: ${DB_USERNAME:-visioncode}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - visioncode

  # ── Redis Cache & Queue ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: visioncode-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - visioncode

  # ── Laravel Reverb (WebSocket Server) ──────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visioncode-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    networks:
      - visioncode

  # ── Queue Worker ────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visioncode-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - mysql
      - redis
    networks:
      - visioncode

  # ── Scheduler (Cron) ───────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visioncode-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --no-ansi; sleep 60; done"
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    networks:
      - visioncode

  # ── Jitsi Meet (Optional — uncomment to self-host) ─────────────
  # jitsi:
  #   image: jitsi/web:latest
  #   container_name: visioncode-jitsi
  #   restart: unless-stopped
  #   ports:
  #     - "8443:443"
  #   environment:
  #     - PUBLIC_URL=https://meet.visioncode.test
  #     - ENABLE_AUTH=1
  #     - AUTH_TYPE=jwt
  #     - JWT_APP_ID=${JITSI_APP_ID}
  #     - JWT_APP_SECRET=${JITSI_APP_SECRET}
  #   networks:
  #     - visioncode

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  visioncode:
    driver: bridge
