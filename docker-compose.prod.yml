version: '3.8'

services:
  visionlab-app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: ghcr.io/visionlab-edu/visionlab-app:latest
    container_name: visionlab-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - visionlab-mysql
      - visionlab-redis
    networks:
      - visionlab-network
    security_opt:
      - no-new-privileges:true

  visionlab-queue:
    image: ghcr.io/visionlab-edu/visionlab-app:latest
    container_name: visionlab-queue
    restart: unless-stopped
    command: php artisan horizon
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - visionlab-app
      - visionlab-redis
    networks:
      - visionlab-network
    security_opt:
      - no-new-privileges:true

  visionlab-reverb:
    image: ghcr.io/visionlab-edu/visionlab-app:latest
    container_name: visionlab-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    depends_on:
      - visionlab-app
      - visionlab-redis
    networks:
      - visionlab-network
    security_opt:
      - no-new-privileges:true

  visionlab-scheduler:
    image: ghcr.io/visionlab-edu/visionlab-app:latest
    container_name: visionlab-scheduler
    restart: unless-stopped
    command: sh -c "while [ true ]; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - visionlab-app
    networks:
      - visionlab-network
    security_opt:
      - no-new-privileges:true

  visionlab-nginx:
    image: nginx:alpine
    container_name: visionlab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - visionlab-app
    networks:
      - visionlab-network

  visionlab-mysql:
    image: mysql:8.0
    container_name: visionlab-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-visionlab}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-visionlab}
    volumes:
      - visionlab-mysql-data:/var/lib/mysql
    networks:
      - visionlab-network

  visionlab-redis:
    image: redis:7-alpine
    container_name: visionlab-redis
    restart: unless-stopped
    volumes:
      - visionlab-redis-data:/data
    networks:
      - visionlab-network

  visionlab-jitsi:
    image: jitsi/web:latest
    container_name: visionlab-jitsi
    restart: unless-stopped
    ports:
      - "8443:443"
    environment:
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=${JITSI_APP_ID}
      - JWT_APP_SECRET=${JITSI_APP_SECRET}
    networks:
      - visionlab-network

networks:
  visionlab-network:
    driver: bridge

volumes:
  visionlab-mysql-data:
  visionlab-redis-data:
