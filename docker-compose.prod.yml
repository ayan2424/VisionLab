services:
  nginx:
    image: nginx:alpine
    container_name: visionlab_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - visionlab_net
    restart: unless-stopped

  app:
    build:
      context: .
      target: backend
    container_name: visionlab_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - visionlab_net

  db:
    image: mysql:8.0
    container_name: visionlab_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-visionlab}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-visionlab}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - visionlab_db_data:/var/lib/mysql
    networks:
      - visionlab_net
    # Do not expose ports to host in production

  redis:
    image: redis:7-alpine
    container_name: visionlab_redis
    restart: unless-stopped
    volumes:
      - visionlab_redis_data:/data
    networks:
      - visionlab_net
    # Do not expose ports to host in production

  reverb:
    build:
      context: .
      target: backend
    container_name: visionlab_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - visionlab_net

  queue:
    build:
      context: .
      target: backend
    container_name: visionlab_queue
    restart: unless-stopped
    command: php artisan horizon
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - visionlab_net

  scheduler:
    build:
      context: .
      target: backend
    container_name: visionlab_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - visionlab_net

networks:
  visionlab_net:
    driver: bridge

volumes:
  visionlab_db_data:
  visionlab_redis_data:
